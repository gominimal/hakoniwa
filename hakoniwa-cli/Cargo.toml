[package]
name = "hakoniwa-cli"
version = "1.2.2"
description = "Process isolation for Linux using namespaces, resource limits, landlock and seccomp."
keywords = ["security", "sandbox", "container", "process"]
categories = ["security"]
homepage = "https://github.com/souk4711/hakoniwa"
repository = "https://github.com/souk4711/hakoniwa"
include = ["src/**/*", "LICENSE", "../README.md"]
license = "GPL-3.0-only"
readme = "../README.md"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.50", features = ["derive"] }
clap-verbosity-flag = "3.0.4"
clap_complete = "4.5.59"
env_logger = "0.11.8"
glob = "0.3.3"
log = "0.4.28"
minijinja = { version = "2.12.0", features = ["loader"] }
nix = { version = "0.30.1", features = ["user"] }
rust-embed = "8.8.0"
serde = "1.0.228"
serde_json = "1.0.145"
toml = "0.9.8"

[dependencies.hakoniwa]
version = "1.2.2"
path = "../hakoniwa"
features = ["landlock", "seccomp"]

[dev-dependencies]
trycmd = "0.15.10"

[[bin]]
name = "hakoniwa"
path = "src/main.rs"
